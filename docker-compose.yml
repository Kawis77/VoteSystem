version: '3.8'

# For easier local startup/demo, simple development credentials are used (e.g. root).
# Do not use these values in production environments.
services:
  db:
    image: mysql:8
    container_name: voting-db
    restart: always
    environment:
      MYSQL_DATABASE: voting_db
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root}
    ports:
      - "3307:3306"

  app:
    build: .
    container_name: voting-app
    restart: always
    depends_on:
      - db
    ports:
      - "8081:8080"
    environment:
      DB_PASSWORD: ${DB_PASSWORD:-root}
      SPRING_PROFILES_ACTIVE: docker
