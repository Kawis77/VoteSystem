<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voting System API</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: radial-gradient(circle at 20% 20%, #dbeafe 0%, #f8fafc 45%, #ecfeff 100%);
            color: #1f2937;
            height: 100vh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            box-sizing: border-box;
        }

        .card {
            background: rgba(255, 255, 255, 0.92);
            border: 1px solid #dbe3ef;
            border-radius: 16px;
            padding: 34px;
            max-width: 560px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 45px rgba(15, 23, 42, 0.14);
            backdrop-filter: blur(6px);
        }

        h1 {
            margin: 0 0 12px;
            font-size: 2rem;
        }

        p {
            margin: 0 0 20px;
            line-height: 1.5;
        }

        .button {
            display: inline-block;
            text-decoration: none;
            background: linear-gradient(135deg, #0f766e 0%, #0e7490 100%);
            color: #ffffff;
            padding: 11px 20px;
            border-radius: 8px;
            font-weight: 600;
            box-shadow: 0 8px 18px rgba(15, 118, 110, 0.32);
            transition: transform 0.15s ease, box-shadow 0.15s ease;
        }

        .button:hover {
            transform: translateY(-1px);
            box-shadow: 0 12px 22px rgba(15, 118, 110, 0.42);
        }
    </style>
</head>
<body>
<main class="card">
    <h1>Voting System API</h1>
    <p>This application exposes REST API only. Use Swagger UI to explore and test available endpoints.</p>
    <a class="button" href="/swagger-ui.html">Open Swagger UI</a>
</main>
</body>
</html>
